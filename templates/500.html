{% extends "base.html" %}

{% block title %}500 - Server Error{% endblock %}

{% block content %}
    <main class="center-screen-main">
        <div class="container narrow-center">
            <div class="card">
                <div class="error-hero-icon">500</div>
                <h1 class="error-hero-title">500 - Checkmate</h1>
                <p class="error-hero-body">Our server hit an unexpected problem.</p>
                <p class="error-hero-caption">Our team has been notified and is working on a fix. We're sorry for the disruption!</p>
                <a href="/" class="btn btn-primary">Return to Leaderboard</a>
            </div>
        </div>
    </main>
{% endblock %}
