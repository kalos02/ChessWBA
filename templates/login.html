{% extends "base.html" %}

{#
    Reserved for future authentication feature (not required for current project)
#}

{% block title %}Login - Chess Club{% endblock %}

{% block content %}
<div class="container auth-container auth-login">
    <div class="card">
        <div class="card-header">
            <h1 class="card-title">Member Access</h1>
            <p class="auth-subtitle">Open the member workspace</p>
        </div>

        <form method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block mt-1">Continue</button>
        </form>
    </div>
</div>
{% endblock %}
