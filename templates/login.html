{% extends "layout.html" %}

{% block title %}Login - Chess Club{% endblock %}

{% block content %}
<div class="container" style="max-width: 450px; margin-top: 3rem;">
    <div class="card">
        <div class="card-header">
            <h1 class="card-title">♚ Welcome Back</h1>
            <p style="color: var(--text-light); font-size: 0.95rem; margin: 0.5rem 0 0 0;">Sign in to your account to continue playing</p>
        </div>

        <form method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Sign In to Chess Club</button>
        </form>

        <div class="divider"></div>

        <p class="text-center" style="color: var(--text-light);">New to Chess Club? <a href="/register" style="color: var(--accent); font-weight: 600;">Create an account</a></p>
    </div>
</div>
{% endblock %}
