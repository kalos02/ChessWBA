{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
    <main class="center-screen-main">
        <div class="container narrow-center">
            <div class="card">
                <div class="error-hero-icon">404</div>
                <h1 class="error-hero-title">404 - Lost in the Game</h1>
                <p class="error-hero-body">We couldn't find the page you're looking for.</p>
                <p class="error-hero-caption">Maybe it's hiding on the other side of the chessboard?</p>
                <a href="/" class="btn btn-primary">Return to Leaderboard</a>
            </div>
        </div>
    </main>
{% endblock %}
