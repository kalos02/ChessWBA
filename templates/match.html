{% extends "base.html" %}

{#
    ChessWBA match page (frontend)
    - form to schedule or log a completed match
#}

{% block title %}Add Match - Chess Club{% endblock %}

{% block content %}
<style>
    .match-form-card {
        max-width: 620px;
    }

    #result-section {
        display: none;
    }
</style>
<div class="page-header">
    <h1>Add a Match</h1>
    <p>Schedule a match or log a completed result</p>
</div>

<div class="card match-form-card">
    <div class="card-header">
        <h2 class="card-title">Match Details</h2>
    </div>

    <form method="post" id="match-form">
        <div class="form-group">
            <label for="player1_id">Player 1</label>
            <select id="player1_id" name="player1_id" required onchange="updateButtonLabels()">
                <option value="">Choose a player</option>
                {% for user in users %}
                <option value="{{ user.id }}">{{ user.first_name }} {{ user.last_name }} (Rank #{{ user.ranking }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="player2_id">Player 2</label>
            <select id="player2_id" name="player2_id" required onchange="updateButtonLabels()">
                <option value="">Choose a player</option>
                {% for user in users %}
                <option value="{{ user.id }}">{{ user.first_name }} {{ user.last_name }} (Rank #{{ user.ranking }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="venue">Venue</label>
            <input type="text" id="venue" name="venue" placeholder="e.g. Chess Club Hall, Room 3">
        </div>

        <div class="form-group">
            <label for="scheduled_date">Scheduled Date</label>
            <input type="date" id="scheduled_date" name="scheduled_date">
        </div>

        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status" onchange="toggleResultSection()">
                <option value="SCHEDULED">Pending</option>
                <option value="PLAYING">Playing</option>
                <option value="COMPLETED">Complete</option>
                <option value="CANCELED">Canceled</option>
            </select>
        </div>

        <div class="form-group" id="result-section">
            <label>Result</label>
            <span class="label-hint">Select the match result</span>
            <div class="result-buttons">
                <button type="button" class="result-btn" id="btn-p1" onclick="setResult('p1', this)">Player 1 Wins</button>
                <button type="button" class="result-btn" onclick="setResult('draw', this)">Draw</button>
                <button type="button" class="result-btn" id="btn-p2" onclick="setResult('p2', this)">Player 2 Wins</button>
            </div>
            <input type="hidden" id="result" name="result">
        </div>

        <button type="submit" class="btn btn-primary btn-block mt-1">Save</button>
    </form>
</div>

<script>
function updateButtonLabels() {
    const p1Sel = document.getElementById('player1_id');
    const p2Sel = document.getElementById('player2_id');
    const p1Text = p1Sel.selectedIndex > 0 ? p1Sel.options[p1Sel.selectedIndex].text.split(' (')[0] : 'Player 1';
    const p2Text = p2Sel.selectedIndex > 0 ? p2Sel.options[p2Sel.selectedIndex].text.split(' (')[0] : 'Player 2';
    document.getElementById('btn-p1').textContent = p1Text + ' Wins';
    document.getElementById('btn-p2').textContent = p2Text + ' Wins';
}

function setResult(result, button) {
    document.getElementById('result').value = result;
    document.querySelectorAll('.result-btn').forEach(function(btn) { btn.classList.remove('active'); });
    button.classList.add('active');
}

function toggleResultSection() {
    const status = document.getElementById('status').value;
    const section = document.getElementById('result-section');
    if (status === 'COMPLETE' || status === 'COMPLETED') {
        section.style.display = 'block';
    } else {
        section.style.display = 'none';
        document.getElementById('result').value = '';
        document.querySelectorAll('.result-btn').forEach(function(btn) { btn.classList.remove('active'); });
    }
}
</script>
{% endblock %}
